<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#090c0b">
  <meta name="color-scheme" content="dark">
  <meta name="format-detection" content="telephone=no">
  <title>反着来 - 看到什么，做相反的</title>
  <style>
    * { margin:0; padding:0; box-sizing: border-box; }
    html, body {
      width: 100%;
      min-height: 100%;
      background:
        radial-gradient(circle at 50% 20%, rgba(0, 245, 160, 0.07), transparent 32rem),
        #060807;
      overflow: hidden;
      overscroll-behavior: none;
      -webkit-touch-callout: none;
      -webkit-user-select: none;
      user-select: none;
    }
    body {
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding:
        env(safe-area-inset-top)
        env(safe-area-inset-right)
        env(safe-area-inset-bottom)
        env(safe-area-inset-left);
      font-family: "Alibaba PuHuiTi", "PingFang SC", "Microsoft YaHei", sans-serif;
      -webkit-font-smoothing: antialiased;
    }
    .game-shell {
      width: 100%;
      height: 100vh;
      height: 100dvh;
      min-width: 0;
      min-height: 0;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    canvas {
      display: block;
      flex: 0 0 auto;
      max-width: 100%;
      max-height: 100%;
      background: #090c0b;
      border: 1px solid rgba(0, 245, 160, 0.16);
      border-radius: 0;
      box-shadow:
        0 28px 80px rgba(0, 0, 0, 0.45),
        6px 7px 0 rgba(0, 245, 160, 0.10),
        0 0 48px rgba(0, 245, 160, 0.05);
      touch-action: none;
      image-rendering: auto;
    }
    .fallback {
      max-width: 28rem;
      padding: 1.5rem;
      color: #b3b3b3;
      line-height: 1.6;
      text-align: center;
    }
    /* ── 在线 PK 昵称输入 ── */
    .pk-name-overlay {
      position: fixed; inset: 0; z-index: 100;
      display: none; place-items: center;
      background: rgba(0,0,0,0.82);
    }
    .pk-name-overlay.is-open { display: grid; }
    .pk-name-dialog {
      width: min(calc(100vw - 48px), 340px);
      padding: 28px 24px 22px;
      border: 1px solid rgba(0,245,160,0.48);
      border-radius: 14px;
      background: #0f1814;
      box-shadow: 0 24px 70px rgba(0,0,0,0.55);
    }
    .pk-name-dialog h2 {
      margin-bottom: 6px;
      font-size: 19px;
      color: #00f5a0;
    }
    .pk-name-dialog p {
      margin-bottom: 16px;
      font-size: 12px;
      color: #95a29d;
    }
    .pk-name-dialog input {
      width: 100%; height: 46px;
      padding: 0 14px;
      border: 1px solid #26302d;
      border-radius: 10px;
      background: #080c0a;
      color: #fff;
      font: 16px/1 inherit;
      outline: none;
    }
    .pk-name-dialog input:focus {
      border-color: #00f5a0;
    }
    .pk-name-actions {
      display: flex; gap: 10px; margin-top: 16px;
    }
    .pk-name-actions button {
      flex: 1; height: 44px;
      border: 0; border-radius: 10px;
      font: 700 15px/1 inherit;
      cursor: pointer;
    }
    .pk-btn-confirm {
      background: #00f5a0; color: #07110d;
    }
    .pk-btn-cancel {
      background: rgba(255,255,255,0.08); color: #95a29d;
    }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }
    .share-fallback {
      position: fixed;
      inset: 0;
      z-index: 20;
      display: none;
      place-items: center;
      padding: 24px;
      background: rgba(0, 0, 0, 0.78);
    }
    .share-fallback.is-open { display: grid; }
    .share-dialog {
      width: min(100%, 420px);
      padding: 20px;
      border: 1px solid rgba(0, 255, 157, 0.42);
      border-radius: 16px;
      background: #121816;
      color: #fff;
      box-shadow: 0 20px 70px rgba(0, 0, 0, 0.55);
    }
    .share-dialog h2 { margin-bottom: 12px; font-size: 20px; }
    .share-dialog textarea {
      width: 100%;
      min-height: 116px;
      resize: none;
      padding: 12px;
      border: 1px solid #2a3431;
      border-radius: 12px;
      background: #090c0b;
      color: #fff;
      font: 15px/1.6 inherit;
      user-select: text;
      -webkit-user-select: text;
    }
    .share-dialog button {
      width: 100%;
      height: 48px;
      margin-top: 12px;
      border: 0;
      border-radius: 12px;
      background: #00f5a0;
      color: #07110d;
      font: 700 16px/1 inherit;
    }
    @media (max-width: 520px), (max-height: 860px) {
      body { padding: 0; }
      canvas {
        border: 0;
        border-radius: 0;
        box-shadow: none;
      }
    }
  </style>

  <!-- ════════════════════════════════════════
        AudioManager — 音频管理系统（队友提供）
       ════════════════════════════════════════ -->
  <script>
    // =========================================
    // 1. 全局音频管理器 (包含所有音频的预加载和分类)
    // =========================================
    const AudioManager = {
      // 游戏进行时的核心反馈音效
      gameplay: {
        correct: new Audio('/static/sounds/答对.mp3'),
        wrong:   new Audio('/static/sounds/答错.mp3')
      },
      // 开始游戏时的随机池
      startPool: [
        new Audio('/static/sounds/开始1.mp3'),
        new Audio('/static/sounds/开始2.mp3')
      ],
      // 游戏成功结束时的随机池
      successPool: [
        new Audio('/static/sounds/成功1.mp3'),
        new Audio('/static/sounds/成功2.mp3'),
        new Audio('/static/sounds/成功3.mp3'),
        new Audio('/static/sounds/成功4.mp3'),
        new Audio('/static/sounds/成功5.mp3')
      ],
      // 游戏失败结束时的随机池
      failPool: [
        new Audio('/static/sounds/失败1.mp3'),
        new Audio('/static/sounds/失败2.mp3'),
        new Audio('/static/sounds/失败3.mp3')
      ]
    };

    // 统一初始化音量设置（防止声音太大炸耳）
    const initVolume = () => {
      AudioManager.gameplay.correct.volume = 0.6;
      AudioManager.gameplay.wrong.volume   = 0.5;
      AudioManager.startPool.forEach(a => a.volume = 0.6);
      AudioManager.successPool.forEach(a => a.volume = 0.6);
      AudioManager.failPool.forEach(a => a.volume = 0.6);
    };
    initVolume();

    // =========================================
    // 2. 核心播放函数 (防掐音 + 防内存泄漏)
    // =========================================
    const playSound = (audioObject) => {
      const clone = audioObject.cloneNode();
      clone.volume = audioObject.volume;
      clone.onended = () => {
        clone.src = '';
        clone.removeAttribute('src');
      };
      clone.play().catch(e => {
        console.log("音频播放被拦截，等待用户交互:", e);
      });
    };

    // 从指定的音频数组里随机挑一个播放
    const playRandomFromPool = (pool) => {
      const randomIndex = Math.floor(Math.random() * pool.length);
      playSound(pool[randomIndex]);
    };

    // =========================================
    // 3. 浏览器安全解锁逻辑 (必须在点击"开始游戏"时触发)
    // =========================================
    const unlockAllAudio = () => {
      const allAudios = [
        AudioManager.gameplay.correct,
        AudioManager.gameplay.wrong,
        ...AudioManager.startPool,
        ...AudioManager.successPool,
        ...AudioManager.failPool
      ];
      allAudios.forEach(audio => {
        audio.volume = 0;
        audio.play().then(() => {
          audio.pause();
          audio.currentTime = 0;
        }).catch(err => console.log("激活音频池中...", err));
      });
      // 激活完成后重新恢复正常音量
      setTimeout(initVolume, 200);
    };
  </script>

  <!-- ════════════════════════════════════════
        Socket.IO 客户端（CDN）
       ════════════════════════════════════════ -->
  <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
  <script src="/static/src/data/questionPool/easyQuestions.js" defer></script>
  <script src="/static/src/data/questionPool/mediumQuestions.js" defer></script>
  <script src="/static/src/data/questionPool/hardQuestions.js" defer></script>
  <script src="/static/src/data/questionPool/bossQuestions.js" defer></script>
  <script src="/static/src/data/questionPool/motionQuestions.js" defer></script>
  <script src="/static/questions.js" defer></script>
  <script src="/static/game.js" defer></script>
</head>
<body>
  <main id="gameShell" class="game-shell">
    <canvas
      id="gameCanvas"
      tabindex="0"
      role="application"
      aria-describedby="gameInstructions"
      aria-label="反着来游戏画面"
    >
      <p class="fallback">当前浏览器不支持 Canvas，无法运行《反着来》。请升级浏览器后重试。</p>
    </canvas>
    <p id="gameInstructions" class="sr-only">
      根据屏幕提示做出相反操作。方向题可滑动或使用左右方向键，按钮题可点击或使用数字键。
    </p>
  </main>
  <section id="shareFallback" class="share-fallback" aria-hidden="true">
    <div class="share-dialog" role="dialog" aria-modal="true" aria-labelledby="shareFallbackTitle">
      <h2 id="shareFallbackTitle">复制挑战文案</h2>
      <textarea id="shareFallbackText" readonly></textarea>
      <button id="closeShareFallback" type="button">完成</button>
    </div>
  </section>
  <!-- ════════════════════════════════════════
        在线 PK 昵称输入
       ════════════════════════════════════════ -->
  <section id="pkNameOverlay" class="pk-name-overlay" aria-hidden="true">
    <div class="pk-name-dialog" role="dialog" aria-modal="true">
      <h2>在线对战</h2>
      <p>输入昵称后开始匹配对手</p>
      <input id="pkNameInput" type="text" placeholder="输入昵称 (最多8字)" maxlength="8" autocomplete="off" spellcheck="false">
      <div class="pk-name-actions">
        <button id="pkNameCancelBtn" class="pk-btn-cancel" type="button">返回</button>
        <button id="pkNameConfirmBtn" class="pk-btn-confirm" type="button">开始匹配</button>
      </div>
    </div>
  </section>
  <noscript>
    <p class="fallback">《反着来》需要启用 JavaScript 才能运行。</p>
  </noscript>
</body>
</html>
